/* ====== Reset & Variables ====== */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #080c16;
  --bg-nav: #0b1124;
  --bg-card: #111827;
  --bg-card-hover: #161e33;
  --bg-input: #111827;
  --border: #1e293b;
  --border-hover: #334155;
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --text-muted: #64748b;
  --cyan: #22d3ee;
  --cyan-dim: #0891b2;
  --red: #ef4444;
  --amber: #f59e0b;
  --purple: #a78bfa;
  --green: #34d399;
  --blue: #60a5fa;
  --radius: 10px;
  --radius-sm: 6px;
  --font: system-ui, -apple-system, 'Segoe UI', sans-serif;
  --mono: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', monospace;
  --shadow: 0 4px 24px rgba(0,0,0,.4);
  --transition: 180ms ease;
}

html { scroll-behavior:smooth; }
body {
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  line-height:1.6;
  min-height:100vh;
  background-image:
    radial-gradient(ellipse at 15% 5%, rgba(34,211,238,.015) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 80%, rgba(139,92,246,.01) 0%, transparent 55%);
  background-attachment:fixed;
}

::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--border-hover); }

/* ====== Navigation ====== */
.nav {
  position:sticky; top:0; z-index:100;
  background:rgba(11,17,36,.94);
  backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  height:56px; display:flex; align-items:center; padding:0 24px;
}
.nav-logo {
  display:flex; align-items:center; gap:10px;
  text-decoration:none; color:var(--text); font-weight:700; font-size:17px;
  font-family:var(--mono); letter-spacing:-.3px;
}
.nav-logo svg { width:28px; height:28px; }
.nav-logo .accent { color:var(--cyan); }
.nav-links { display:flex; gap:4px; margin-left:auto; }
.nav-links a {
  color:var(--text-dim); text-decoration:none; font-size:13px; font-weight:500;
  padding:6px 14px; border-radius:6px; transition:var(--transition);
}
.nav-links a:hover { color:var(--text); background:rgba(255,255,255,.04); }

/* ====== Container ====== */
.wrap { max-width:1200px; margin:0 auto; padding:0 24px; }

/* ====== Hero ====== */
.hero { padding:40px 0 28px; }
.hero-status {
  display:flex; align-items:center; gap:8px;
  font-family:var(--mono); font-size:12px; color:var(--cyan);
  letter-spacing:1.5px; margin-bottom:8px;
}
.hero-status .dot {
  width:7px; height:7px; border-radius:50%; background:var(--red);
  animation:pulse 1.8s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.65)} }
.hero h1 {
  font-size:26px; font-weight:800; line-height:1.3; margin-bottom:20px;
  background:linear-gradient(135deg, #f1f5f9 40%, var(--cyan) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}

/* ====== Digest Card ====== */
.digest {
  background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius);
  padding:24px 28px; position:relative; overflow:hidden;
  box-shadow:0 2px 12px rgba(0,0,0,.3);
}
.digest::before {
  content:''; position:absolute; top:0; left:0; width:3px; height:100%;
  background:linear-gradient(180deg, var(--red), var(--amber), var(--cyan));
}
.digest-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:8px; }
.digest-label { font-family:var(--mono); font-size:13px; font-weight:600; color:var(--cyan); letter-spacing:1px; }
.digest-date { font-size:12px; color:var(--text-muted); font-family:var(--mono); }
.digest-body { font-size:14px; color:var(--text-dim); line-height:1.7; }
.digest-body strong { color:var(--text); font-weight:600; }
.digest-badge {
  display:inline-block; font-family:var(--mono); font-size:11px; font-weight:700;
  padding:0 7px; border-radius:4px; margin-right:4px; vertical-align:middle;
}
.digest-badge.crit { background:rgba(239,68,68,.14); color:var(--red); }
.digest-badge.apt  { background:rgba(245,158,11,.14); color:var(--amber); }
.digest-badge.tech { background:rgba(167,139,250,.14); color:var(--purple); }

/* ====== Controls ====== */
.controls { padding:24px 0 16px; display:flex; flex-direction:column; gap:14px; }
.search-bar {
  display:flex; align-items:center; background:var(--bg-input);
  border:1px solid var(--border); border-radius:8px; padding:0 14px;
  transition:var(--transition); max-width:420px;
}
.search-bar:focus-within { border-color:var(--cyan); box-shadow:0 0 0 3px rgba(34,211,238,.06); }
.search-bar svg { flex-shrink:0; color:var(--text-muted); }
.search-bar input {
  background:none; border:none; outline:none; color:var(--text); font-size:14px;
  padding:10px 10px; width:100%; font-family:var(--font);
}
.search-bar input::placeholder { color:var(--text-muted); }
.search-bar .clear {
  background:none; border:none; color:var(--text-muted); cursor:pointer;
  padding:4px 6px; border-radius:4px; font-size:15px; display:none;
}
.search-bar .clear.show { display:block; }
.search-bar .clear:hover { color:var(--text); }

.filter-row { display:flex; flex-wrap:wrap; gap:7px; align-items:center; }
.fbtn {
  background:var(--bg-card); border:1px solid var(--border); color:var(--text-dim);
  font-family:var(--font); font-size:12.5px; font-weight:500;
  padding:6px 16px; border-radius:20px; cursor:pointer;
  transition:var(--transition); white-space:nowrap; user-select:none;
}
.fbtn:hover { background:var(--bg-card-hover); color:var(--text); border-color:var(--border-hover); }
.fbtn.on { color:var(--cyan); border-color:var(--cyan); background:rgba(34,211,238,.08); }
.fbtn[data-filter="hot"].on     { color:var(--red);    border-color:var(--red);    background:rgba(239,68,68,.08); }
.fbtn[data-filter="important"].on { color:var(--amber);  border-color:var(--amber);  background:rgba(245,158,11,.08); }
.fbtn[data-filter="newtech"].on  { color:var(--purple);  border-color:var(--purple);  background:rgba(139,92,246,.08); }
.fbtn[data-filter="news"].on     { color:var(--blue);    border-color:var(--blue);    background:rgba(96,165,250,.08); }
.fbtn[data-filter="techniques"].on{ color:var(--green);   border-color:var(--green);   background:rgba(52,211,153,.08); }
.count { font-size:12px; color:var(--text-muted); font-family:var(--mono); margin-left:auto; }

/* ====== Grid ====== */
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:18px; padding-bottom:36px; }
.grid.empty { display:flex; }

.card {
  background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius);
  padding:22px 22px 20px; transition:all var(--transition);
  display:flex; flex-direction:column;
  animation:fadeUp .4s ease forwards; opacity:0;
}
@keyframes fadeUp { to { opacity:1; transform:translateY(0); } from { opacity:0; transform:translateY(14px); } }
.card:hover {
  background:var(--bg-card-hover); border-color:var(--border-hover);
  transform:translateY(-2px); box-shadow:0 8px 32px rgba(0,0,0,.45);
}
.card-tags { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:12px; }
.ctag {
  font-size:10.5px; font-weight:700; padding:3px 9px; border-radius:12px;
  font-family:var(--mono); letter-spacing:.2px;
}
.ctag.hot       { background:rgba(239,68,68,.12); color:var(--red); }
.ctag.important { background:rgba(245,158,11,.12); color:var(--amber); }
.ctag.newtech   { background:rgba(139,92,246,.12); color:var(--purple); }
.ctag.news      { background:rgba(96,165,250,.10); color:var(--blue); }
.ctag.techniques{ background:rgba(52,211,153,.10); color:var(--green); }
.ctag.tools     { background:rgba(34,211,238,.10); color:var(--cyan); }

.card-title { font-size:16px; font-weight:700; line-height:1.4; margin-bottom:8px; color:var(--text); }
.card-desc  { font-size:13.5px; color:var(--text-dim); line-height:1.6; flex-grow:1; }
.card-foot  {
  margin-top:16px; padding-top:12px; border-top:1px solid rgba(255,255,255,.03);
  display:flex; align-items:center; justify-content:space-between;
  font-size:11.5px; color:var(--text-muted);
}

/* ====== Empty ====== */
.none {
  grid-column:1/-1; display:flex; flex-direction:column; align-items:center;
  justify-content:center; padding:60px 20px; color:var(--text-muted); text-align:center;
}
.none .icon { font-size:44px; margin-bottom:12px; opacity:.35; }
.none .title { font-size:15px; font-weight:600; color:var(--text-dim); }
.none .sub { font-size:13px; margin-top:4px; }

/* ====== To-top ====== */
#toTop {
  position:fixed; bottom:28px; right:28px; z-index:90;
  width:40px; height:40px; border-radius:10px;
  background:var(--bg-card); border:1px solid var(--border); color:var(--text-dim);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; opacity:0; pointer-events:none;
  transition:var(--transition); font-size:18px;
}
#toTop.show { opacity:1; pointer-events:auto; }
#toTop:hover { background:var(--bg-card-hover); color:var(--cyan); border-color:var(--cyan); }

/* ====== Footer ====== */
.foot {
  border-top:1px solid var(--border); padding:22px 24px; text-align:center;
  font-size:12.5px; color:var(--text-muted);
}
.foot .fw { max-width:1200px; margin:0 auto; display:flex; flex-wrap:wrap; align-items:center; justify-content:center; gap:8px 20px; }
.foot .brand { font-family:var(--mono); font-weight:600; }
.foot .brand span { color:var(--cyan); }
.foot a { color:var(--cyan); text-decoration:none; }
.foot a:hover { text-decoration:underline; }

/* ====== Responsive ====== */
@media (max-width: 768px) {
  .wrap { padding:0 16px; }
  .nav { padding:0 16px; }
  .nav-logo { font-size:15px; }
  .nav-links a { font-size:12px; padding:4px 10px; }
  .hero h1 { font-size:21px; }
  .digest { padding:18px 18px; }
  .digest-body { font-size:13px; }
  .grid { grid-template-columns:1fr; gap:14px; }
  .card { padding:18px 16px 16px; }
  .card-title { font-size:15px; }
  .search-bar { max-width:100%; }
  .filter-row { gap:5px; }
  .fbtn { font-size:11.5px; padding:5px 12px; }
  .count { margin-left:0; width:100%; }
  #toTop { bottom:16px; right:16px; }
}
@media (min-width:769px) and (max-width:1024px) {
  .grid { grid-template-columns:repeat(2,1fr); }
}
</style>
</head>

<script>
(function() {
  'use strict';

  var data = JSON.parse(document.getElementById('articles-json').textContent);
  var articles = data;
  var filter = 'all';
  var search = '';
  var timer = 0;
  var gid = document.getElementById('articleGrid');
  var input = document.getElementById('searchInput');
  var clear = document.getElementById('clearBtn');
  var count = document.getElementById('resultCount');
  var fbtns = document.querySelectorAll('.fbtn');

  // Digest date
  var now = new Date();
  document.getElementById('digestDate').textContent =
    now.getFullYear() + '-' +
    String(now.getMonth()+1).padStart(2,'0') + '-' +
    String(now.getDate()).padStart(2,'0') + '  ·  实时更新';

  // Parse digest from data if available, or show alert count
  function renderDigest() {
    var crit = articles.filter(function(a){ return a.priority==='重要'; }).length;
    var hitech = articles.filter(function(a){ return a.priority==='新技术'; }).length;
    var normal = articles.length - crit - hitech;
    document.getElementById('digestContent').innerHTML =
      '<strong>今日情报</strong>：共 <strong>' + articles.length + '</strong> 篇安全资讯。' +
      '<span class="digest-badge crit">重要 ' + crit + '</span>' +
      (hitech ? '<span class="digest-badge tech">新技术 ' + hitech + '</span>' : '') +
      ' 自动标注完成。重点关注严重漏洞与新型攻击技术。';
  }
  renderDigest();

  function tagClass(t) {
    var m = { hot:'hot', important:'important', newtech:'newtech', news:'news', techniques:'techniques', tools:'tools' };
    return m[t] || 'news';
  }

  function tagLabel(t) {
    var labels = { hot:'热门', important:'重要', newtech:'新技术', news:'新闻', techniques:'技术', tools:'工具' };
    return labels[t] || t;
  }

  function cardHTML(a, idx) {
    var tgs = (a.tags || []).map(function(t) {
      return '<span class="ctag ' + tagClass(t) + '">' + tagLabel(t) + '</span>';
    }).join('');
    var desc = a.summary_short || a.summary || a.description || '';
    return '<div class="card" style="animation-delay:' + (idx * 0.04).toFixed(2) + 's">' +
      '<div class="card-tags">' + tgs + '</div>' +
      '<div class="card-title">' + escapeHTML(a.title || '') + '</div>' +
      '<div class="card-desc">' + escapeHTML(desc) + '</div>' +
      '<div class="card-foot">' +
        '<span>' + (a.source || 'SecNews 情报源') + '</span>' +
        '<span>热度 ' + (a.heat_score || 0) + '</span>' +
      '</div></div>';
  }

  function escapeHTML(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function render() {
    var results = articles.slice();

    if (filter !== 'all') {
      results = results.filter(function(a) {
        return (a.tags || []).indexOf(filter) !== -1 ||
               a.priority === (filter === 'important' ? '重要' : filter === 'newtech' ? '新技术' : '') ||
               a.category === {'news':'新闻','techniques':'技术'}[filter];
      });
    }

    if (search.trim()) {
      var q = search.trim().toLowerCase();
      results = results.filter(function(a) {
        return (a.title || '').toLowerCase().indexOf(q) !== -1 ||
               (a.summary_short || a.summary || '').toLowerCase().indexOf(q) !== -1 ||
               (a.keywords || []).some(function(k){ return k.toLowerCase().indexOf(q) !== -1; });
      });
    }

    count.textContent = results.length + ' / ' + articles.length + ' 篇';
    clear.classList.toggle('show', search.trim().length > 0);

    if (results.length === 0) {
      gid.innerHTML = '<div class="none"><div class="icon">No data</div><div class="title">没有匹配的文章</div><div class="sub">调整筛选条件或搜索关键词</div></div>';
      gid.classList.add('empty');
    } else {
      gid.classList.remove('empty');
      gid.innerHTML = results.map(cardHTML).join('');
    }
  }

  function setFilter(f) {
    filter = f;
    fbtns.forEach(function(b){ b.classList.toggle('on', b.dataset.filter === f); });
    render();
  }

  fbtns.forEach(function(b) {
    b.addEventListener('click', function(){ setFilter(this.dataset.filter); });
  });

  input.addEventListener('input', function() {
    search = this.value;
    clearTimeout(timer);
    timer = setTimeout(render, 260);
  });

  clear.addEventListener('click', function() {
    input.value = ''; search = ''; render(); input.focus();
  });

  input.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') { input.value = ''; search = ''; render(); input.blur(); }
  });

  // Scroll to top
  var toTop = document.getElementById('toTop');
  window.addEventListener('scroll', function() {
    toTop.classList.toggle('show', window.scrollY > 400);
  });
  toTop.addEventListener('click', function() {
    window.scrollTo({ top:0, behavior:'smooth' });
  });

  render();
})();
</script>
