<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cybersecurity News Aggregator</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <div class="logo">🛡️ SecNews</div>
        <nav>
            <ul>
                <li><a href="#news">News</a></li>
                <li><a href="#techniques">Techniques</a></li>
                <li><a href="#tools">Tools</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="hot">Hot</button>
            <button class="filter-btn" data-filter="important">Important</button>
            <button class="filter-btn" data-filter="new-tech">New Tech</button>
            <button class="filter-btn" data-filter="news">News</button>
            <button class="filter-btn" data-filter="technique">Techniques</button>
        </section>

        <section class="articles" id="articles">
            <p>Loading articles...</p>
        </section>
    </main>

    <footer>
        <p>Cybersecurity News Aggregator - Built with DeepSeek</p>
    </footer>

    <script src="/static/js/app.js"></script>
</body>
</html>
